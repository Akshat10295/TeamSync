version: '3.8'

services:
  api:
    build: ./backend
    container_name: teamsync-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - EXECUTION_VOLUME=teamsync-tmp # Tell the API to use this volume
    env_file:
      - ./backend/.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/yjs-data:/app/yjs-data
      - teamsync-tmp:/tmp/teamsync-exec # Mount the shared volume
    depends_on:
      - redis
    networks:
      - teamsync-network

  frontend:
    build: ./frontend
    container_name: teamsync-frontend
    ports:
      - "5173:5173"
    networks:
      - teamsync-network

  redis:
    image: redis:alpine
    container_name: teamsync-redis
    ports:
      - "6379:6379"
    networks:
      - teamsync-network

  nginx:
    image: nginx:alpine
    container_name: teamsync-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    networks:
      - teamsync-network

volumes:
  teamsync-tmp: # The shared volume for code execution
networks:
  teamsync-network:
    driver: bridge
